apiVersion: apps/v1
kind: Deployment
metadata:
  name: student-task-manager-deployment
spec:
  replicas: 2
  selector:
    matchLabels:
      app: student-task-manager
  template:
    metadata:
      labels:
        app: student-task-manager
    spec:
      containers:
      - name: student-task-manager
        image: student-task-manager:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 8080
        env:
        - name: SPRING_DATASOURCE_URL
          valueFrom:
            configMapKeyRef:
              name: db-config
              key: db-url
        - name: SPRING_DATASOURCE_USERNAME
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: username
        - name: SPRING_DATASOURCE_PASSWORD
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: password